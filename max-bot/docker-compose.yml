services:
  bot:
    build: .
    container_name: max-transcription-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bot-temp:/app/data/temp
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: max-transcription-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: transcription_bot_max
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d transcription_bot_max"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db-data:
  bot-temp:
